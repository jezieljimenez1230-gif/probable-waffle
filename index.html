<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Papa 💙🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Quicksand',sans-serif;
  background:linear-gradient(135deg,#6ec6ff,#d6ecff);
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
}

#musicBtn, #voiceBtn{
  position:fixed;
  top:15px;
  border:none;
  padding:10px 14px;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
  background:white;
  color:#2b6cb0;
}

#musicBtn{ right:15px; }
#voiceBtn{ right:120px; }

#gift{
  font-size:90px;
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  cursor:pointer;
  animation:float 2s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translate(-50%,-50%) translateY(0)}
  50%{transform:translate(-50%,-50%) translateY(-12px)}
}

.msg{
  display:none;
  position:absolute;
  max-width:360px;
  padding:20px;
  background:rgba(255,255,255,0.2);
  border-radius:20px;
  backdrop-filter:blur(6px);
  line-height:1.6;
}

#msg1{top:35%;}
#msg2{top:45%;}

#finalScreen{
  display:none;
  position:absolute;
  text-align:center;
  font-size:22px;
  padding:20px;
}

.confetti{
  position:absolute;
  width:8px;
  height:8px;
  background:white;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{transform:translateY(100vh);opacity:0}
}

.heart{
  position:absolute;
  font-size:18px;
  animation:floatUp 4s linear forwards;
}

@keyframes floatUp{
  to{transform:translateY(-120vh);opacity:0}
}

.slide{
  width:200px;
  height:200px;
  object-fit:cover;
  border-radius:20px;
  margin-top:10px;
}

</style>
</head>
<body>

<button id="musicBtn" onclick="toggleMusic()">🎶 Music</button>
<button id="voiceBtn" onclick="playVoice()">🎤 Message</button>

<div id="gift" onclick="openGift()">🎁</div>

<div id="msg1" class="msg"></div>
<div id="msg2" class="msg"></div>

<div id="finalScreen">
💙 Papa, I love you so much 💙<br><br>
Thank you for everything you’ve done for our family.<br><br>
<div id="slides">
<img class="slide" src="https://picsum.photos/200/200?1">
<img class="slide" src="https://picsum.photos/200/200?2">
<img class="slide" src="https://picsum.photos/200/200?3">
</div>
</div>

<audio id="music" loop src="https://cdn.pixabay.com/download/audio/2022/03/24/audio_3b1a7f6c5a.mp3"></audio>
<audio id="openSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>
<audio id="voice" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_c8a5f2.mp3"></audio>

<script>
let clicks=0;
let musicOn=false;

const text1="🎂 Happy Birthday Papa 💙\n\nToday is your special day! Thank you for being our strength.";

const text2=`Happy Birthday Papa 💙\n\nDaghang salamat sa imong gugma ug sakripisyo para sa among pamilya. Ikaw ang among kusog ug inspirasyon.\n\nGihigugma ka namo pirme 💙\n— From: Orpha Mae ✨`;

function typeText(id,text){
  const el=document.getElementById(id);
  el.style.display="block";
  el.innerHTML="";
  let i=0;
  (function type(){
    if(i<text.length){
      el.innerHTML+=text[i++];
      setTimeout(type,30);
    }
  })();
}

function openGift(){
  clicks++;
  if(clicks===3){
    document.getElementById("gift").style.display="none";
    document.getElementById("openSound").play();

    spawnConfetti();
    spawnHearts();

    typeText("msg1",text1);

    setTimeout(()=>{
      typeText("msg2",text2);
      setTimeout(showFinal,3000);
    },2000);
  }
}

function showFinal(){
  document.getElementById("msg1").style.display="none";
  document.getElementById("msg2").style.display="none";
  document.getElementById("finalScreen").style.display="block";
}

function spawnConfetti(){
  for(let i=0;i<100;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.top="-10px";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

function spawnHearts(){
  for(let i=0;i<30;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="💙";
    h.style.left=Math.random()*100+"vw";
    h.style.bottom="-20px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  }
}

function toggleMusic(){
  let m=document.getElementById("music");
  musicOn=!musicOn;
  musicOn?m.play():m.pause();
}

function playVoice(){
  document.getElementById("voice").play();
}
</script>

</body>
</html>
